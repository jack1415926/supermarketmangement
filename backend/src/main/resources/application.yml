server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/supermarket?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# ==================== JWT 配置 ====================
# 用于生成和验证 JWT Token 的密钥和过期时间
jwt:
  # 密钥（至少 256 位，生产环境应使用环境变量注入）
  secret: supermarket-jwt-secret-key-2026-this-is-a-256-bit-minimum-key
  # Token 过期时间（毫秒），默认 24 小时 = 86400000
  expiration: 86400000
