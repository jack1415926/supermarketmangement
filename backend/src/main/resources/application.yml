server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/supermarket?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    # 让 JPA 先建表（ddl-auto: update）然后再跑 data.sql 插数据
    defer-datasource-initialization: true

  # 自动加载 src/main/resources 下的 schema.sql + data.sql
  # mode=always 强制每次启动都跑（开发期用；生产期改 never）
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
      continue-on-error: false  # 任何 SQL 错误都让启动失败，便于发现
      encoding: UTF-8

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# ==================== JWT 配置 ====================
# 用于生成和验证 JWT Token 的密钥和过期时间
jwt:
  # 密钥（至少 256 位，生产环境应使用环境变量注入）
  secret: supermarket-jwt-secret-key-2026-this-is-a-256-bit-minimum-key
  # Token 过期时间（毫秒），默认 24 小时 = 86400000
  expiration: 86400000
